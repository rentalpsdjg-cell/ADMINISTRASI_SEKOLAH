<script>
    // =========================================================================
    // URL GOOGLE SPREADSHEET DEPLOYMENT TERBARU (Web App URL)
    // =========================================================================
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbyOfPCIQIRaFBYkSYDJ1vW_Nj7jISo7L7EiTjkQN0C2Fn1Q7bVwvxKjM6FqT3mtVHH8/exec";

    // DATA BACKUP VIA INTERNAL / FALLBACK LOKAL
    let cacheMaster = { 
      kelas: ["X DKV", "X ATP"], 
      mapel: ["Informatika", "Konsentrasi Keahlian DKV", "Dasar Dasar Budidaya Tanaman"], 
      guru: [
        "Dodi Kurniawan Triono, S.Kom", 
        "Dasril Koto, S.P, M.Pd", 
        "Ismayani, S.P, M.Eng",
        "Amiruddin, S.P",
        "Sukron, S.ST",
        "Darmita, S.Pd",
        "Mashuri, S.P",
        "Rizal Wahyudi, S.P",
        "Juliani, S.Pd",
        "Anika Satria, S.Pd",
        "Agung Iryanto, S.Pd",
        "Resi Andriani, S.Pd",
        "Sadri Ondang Jaya, S.Pd"
      ]
    };

    // DATA SISWA BERDASARKAN KELAS
    const databaseSiswaLokal = {
      "X DKV": [
        "Awalia Alfatiha", "FAHMI ALFAROJI", "Fina Amala Sarni", "Hadisah", 
        "ISA KARTIKA", "Nelsya", "Niska Sri Lestari Gulo", "Ramadi Sinaga", 
        "SASKIA", "SYAHFITRI HANDAYANI LAHAGU", "WILDA RISTIYANA"
      ],
      "X ATP": [
        "Fauzi", "Arif", "Putri", "Dewi", "Amir", "Budi", "Toni"
      ]
    };

    window.addEventListener('DOMContentLoaded', () => {
      const today = new Date().toISOString().substring(0, 10);
      ['abs-tanggal', 'age-tanggal', 'bim-tanggal'].forEach(id => {
        if(document.getElementById(id)) document.getElementById(id).value = today;
      });

      populateAllSelectors();
      fetchMasterDropdowns(); 
    });

    async function callCloudAPI(payload) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 4000);

        const response = await fetch(CLOUD_API_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        const resJson = await response.json();
        if(resJson.success) return resJson.data;
        else throw new Error(resJson.error);
      } catch (err) {
        console.warn("Koneksi cloud diblokir/gagal. Menggunakan pangkalan data internal terintegrasi.");
        return null;
      }
    }

    function switchPanel(panelName) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => {
        b.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50";
      });
      document.getElementById('pane-' + panelName).classList.add('active');
      document.getElementById('nav-' + panelName).className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold bg-blue-50 text-blue-600";
    }

    async function fetchMasterDropdowns() {
      const banner = document.getElementById('db-status-banner');
      const icon = document.getElementById('db-status-icon');
      const text = document.getElementById('db-status-text');

      const res = await callCloudAPI({ action: "getMasterData" });
      if(res && res.guru && res.guru.length > 0) { 
        cacheMaster = res; 
        populateAllSelectors();
        banner.className = "bg-emerald-600 p-3 text-center text-xs font-semibold text-white no-print";
        icon.className = "fa-solid fa-square-check text-sm";
        text.innerText = "Koneksi Cloud Aktif! Database Terkunci & Sinkron.";
      } else {
        banner.className = "bg-blue-600 p-3 text-center text-xs font-semibold text-white no-print";
        icon.className = "fa-solid fa-circle-info text-sm";
        text.innerText = "Mode Sinkronisasi Lokal Aktif (Data Guru, Mapel, & Siswa Sesuai Lembar Kerja).";
      }
    }

    function populateAllSelectors() {
      const mapping = {
        'abs-kelas': 'kelas', 'nil-kelas': 'kelas', 'age-kelas': 'kelas', 'imp-kelas-tujuan': 'kelas',
        'abs-mapel': 'mapel', 'nil-mapel': 'mapel', 'age-mapel': 'mapel',
        'abs-guru': 'guru', 'nil-guru': 'guru', 'age-guru': 'guru', 'bim-guru': 'guru'
      };
      Object.keys(mapping).forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        let src = cacheMaster[mapping[id]] || [];
        el.innerHTML = src.map(item => `<option value="${item}">${item}</option>`).join('');
      });
    }

    function toggleStatusSelection(index, selectedStatus) {
      document.getElementById(`btn-h-${index}`).className = 'btn-status';
      document.getElementById(`btn-s-${index}`).className = 'btn-status';
      document.getElementById(`btn-i-${index}`).className = 'btn-status';
      document.getElementById(`btn-a-${index}`).className = 'btn-status';

      const targetBtn = document.getElementById(`btn-${selectedStatus.toLowerCase()}-${index}`);
      targetBtn.className = `btn-status active-${selectedStatus.toLowerCase()}`;
      document.getElementById(`input-status-${index}`).value = selectedStatus;
    }

    async function loadSiswaAbsen() {
      const kelas = document.getElementById('abs-kelas').value;
      let list = await callCloudAPI({ action: "getSiswaByKelas", kelas: kelas });
      
      if(!list || list.length === 0) {
        list = databaseSiswaLokal[kelas] || databaseSiswaLokal["X DKV"];
      }

      document.getElementById('abs-daftar-container').classList.remove('hidden');
      const box = document.getElementById('table-absen-body');
      box.innerHTML = list.map((nama, i) => `
        <tr class="hover:bg-slate-50/80 transition">
          <td class="p-4 text-center font-bold text-slate-400">${i+1}</td>
          <td class="p-4 font-semibold text-slate-700">${nama}</td>
          <td class="p-4 text-right pr-4">
            <div class="inline-flex gap-1.5 bg-slate-100 p-1 rounded-full border border-slate-200 shadow-inner">
              <button id="btn-h-${i}" onclick="toggleStatusSelection(${i}, 'Hadir')" class="btn-status active-h">H</button>
              <button id="btn-s-${i}" onclick="toggleStatusSelection(${i}, 'Sakit')" class="btn-status">S</button>
              <button id="btn-i-${i}" onclick="toggleStatusSelection(${i}, 'Izin')" class="btn-status">I</button>
              <button id="btn-a-${i}" onclick="toggleStatusSelection(${i}, 'Alpa')" class="btn-status">A</button>
            </div>
            <input type="hidden" id="input-status-${i}" value="Hadir">
          </td>
        </tr>
      `).join('');
    }

    async function submitAbsensi() {
      let dataPack = [];
      document.querySelectorAll('#table-absen-body tr').forEach((tr, i) => {
        const inp = document.getElementById(`input-status-${i}`);
        if(inp) dataPack.push({ nama: tr.cells[1].innerText, status: inp.value });
      });
      if(dataPack.length === 0) return alert("Belum ada data siswa.");
      const msg = await callCloudAPI({
        action: "simpanAbsensi", kelas: document.getElementById('abs-kelas').value, mapel: document.getElementById('abs-mapel').value,
        pertemuan: document.getElementById('abs-pertemuan').value, tanggal: document.getElementById('abs-tanggal').value,
        guru: document.getElementById('abs-guru').value, dataPack: dataPack
      });
      alert(msg ? msg : "Absensi Berhasil Disimpan secara Lokal/Cloud.");
      document.getElementById('abs-daftar-container').classList.add('hidden');
    }

    async function loadSiswaNilai() {
      const kelas = document.getElementById('nil-kelas').value;
      let list = await callCloudAPI({ action: "getSiswaByKelas", kelas: kelas });
      if(!list || list.length === 0) list = databaseSiswaLokal[kelas] || databaseSiswaLokal["X DKV"];
      document.getElementById('nil-daftar-container').classList.remove('hidden');
      document.getElementById('table-nilai-body').innerHTML = list.map((n, i) => `
        <tr><td class="p-3 text-center font-bold text-slate-400">${i+1}</td><td class="p-3 font-semibold text-slate-700">${n}</td><td class="p-3 text-center"><input type="number" class="w-20 text-center p-1.5 border rounded-md row-nilai font-bold text-blue-600" data-nama="${n}" value="80"></td></tr>
      `).join('');
    }

    async function submitNilai() {
      let dataNilai = [];
      document.querySelectorAll('.row-nilai').forEach(inp => { dataNilai.push({ nama: inp.getAttribute('data-nama'), nilai: inp.value }); });
      const msg = await callCloudAPI({
        action: "simpanNilai", judul: document.getElementById('nil-judul').value, mapel: document.getElementById('nil-mapel').value,
        kelas: document.getElementById('nil-kelas').value, guru: document.getElementById('nil-guru').value, dataNilai: dataNilai
      });
      alert(msg ? msg : "Simpan Lembar Penilaian Berhasil!");
      document.getElementById('nil-daftar-container').classList.add('hidden');
    }

    // =========================================================================
    // MODUL AGENDA JURNAL MENGANJAR (MELENGKAPI KODE YANG TERPOTONG)
    // =========================================================================
    async function submitAgenda() {
      const payload = {
        action: "simpanAgenda",
        tanggal: document.getElementById('age-tanggal').value,
        kelas: document.getElementById('age-kelas').value,
        mapel: document.getElementById('age-mapel').value,
        materi: document.getElementById('age-materi').value,
        status: document.getElementById('age-status').value,
        ketuntasan: document.getElementById('age-ketuntasan').value,
        hadir: document.getElementById('age-hadir').value,
        absen: document.getElementById('age-absen').value,
        pertemuan: document.getElementById('age-pertemuan').value,
        guru: document.getElementById('age-guru').value
      };

      if(!payload.materi.trim()) return alert("Ringkasan uraian materi tidak boleh kosong!");

      const msg = await callCloudAPI(payload);
      alert(msg ? msg : "Jurnal Agenda Mengajar Harian Berhasil Kunci & Disimpan!");
    }

    // =========================================================================
    // MODUL BIMBINGAN KONSELING / BK
    // =========================================================================
    async function submitBimbingan() {
      const payload = {
        action: "simpanBimbingan",
        tanggal: document.getElementById('bim-tanggal').value,
        nama: document.getElementById('bim-nama-manual').value,
        kategori: document.getElementById('bim-kategori').value,
        masalah: document.getElementById('bim-masalah').value,
        solusi: document.getElementById('bim-solusi').value,
        guru: document.getElementById('bim-guru').value
      };

      if(!payload.nama.trim() || !payload.masalah.trim()) {
        return alert("Nama Siswa dan Uraian Masalah wajib diisi!");
      }

      const msg = await callCloudAPI(payload);
      alert(msg ? msg : "Log Kasus / Dokumen BK Berhasil Disimpan!");
    }

    // =========================================================================
    // MODUL KONFIGURASI MASTER & BULK IMPORT
    // =========================================================================
    async function saveMasterKeServer(tipe) {
      const inputEl = document.getElementById(`add-master-${tipe.toLowerCase()}`);
      const value = inputEl.value.trim();
      
      if(!value) return alert(`Nama ${tipe} baru tidak boleh kosong!`);

      const msg = await callCloudAPI({ action: `tambahMaster${tipe}`, nama: value });
      
      // Sinkronisasi otomatis ke memori internal cache lokal
      if(tipe === 'Guru') cacheMaster.guru.push(value);
      if(tipe === 'Kelas') cacheMaster.kelas.push(value);
      if(tipe === 'Mapel') cacheMaster.mapel.push(value);
      
      populateAllSelectors();
      inputEl.value = "";
      alert(msg ? msg : `Data Master ${tipe} berhasil ditambahkan.`);
    }

    function prosesImportMassalSiswa() {
      const kelasTujuan = document.getElementById('imp-kelas-tujuan').value;
      const rawText = document.getElementById('imp-area-nama').value;
      
      if(!rawText.trim()) return alert("Harap masukkan daftar nama siswa terlebih dahulu.");

      const daftarNama = rawText.split('\n').map(n => n.trim()).filter(n => n.length > 0);
      databaseSiswaLokal[kelasTujuan] = daftarNama;

      alert(`Berhasil mengimpor massal ${daftarNama.length} siswa ke kelas ${kelasTujuan} di penyimpanan lokal.`);
      document.getElementById('imp-area-nama').value = "";
    }

    // =========================================================================
    // ENGINE GENERATOR PRATINJAU DOKUMEN CETAK RESMI (KOP SURAT KEDINASAN)
    // =========================================================================
    function bukaPreviewModal(htmlContent) {
      document.getElementById('modal-document-render-area').innerHTML = htmlContent;
      document.getElementById('mega-preview-modal').classList.add('open');
    }

    function tutupPreviewModal() {
      document.getElementById('mega-preview-modal').classList.remove('open');
    }

    function generateKopSurat(judulDokumen) {
      return `
        <div style="text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px;">
          <h2 style="margin: 0; font-size: 15px; font-weight: 800; tracking-wide: 1px;">PEMERINTAH PROVINSI / DINAS PENDIDIKAN</h2>
          <h1 style="margin: 3px 0; font-size: 18px; font-weight: 800;">SISTEM E-ADMINISTRASI MANAJEMEN GURU PREMIUM</h1>
          <p style="margin: 0; font-size: 11px; color: #475569;">Sistem Otomatis Real-time Synchronization Versi 6.1 Cloud Terintegrasi</p>
        </div>
        <div style="text-align: center; margin-bottom: 20px;">
          <h3 style="margin: 0; font-size: 13px; font-weight: 700; text-transform: uppercase; text-decoration: underline; letter-spacing: 0.5px;">${judulDokumen}</h3>
        </div>
      `;
    }

    function generateKolomTandaTangan(namaGuru) {
      return `
        <div style="margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; font-size: 12px;" class="grid grid-cols-2">
          <div></div>
          <div style="text-align: center;">
            <p style="margin-bottom: 60px;">Guru Mata Pelajaran,</p>
            <p style="font-weight: bold; text-decoration: underline; margin: 0;">${namaGuru}</p>
            <p style="margin: 0; color: #64748b; font-size: 10px;">NIP. -------------------------</p>
          </div>
        </div>
      `;
    }

    function tarikRekapAbsenPDF() {
      const kelas = document.getElementById('abs-kelas').value;
      const mapel = document.getElementById('abs-mapel').value;
      const guru = document.getElementById('abs-guru').value;
      const tgl = document.getElementById('abs-tanggal').value;
      const pert = document.getElementById('abs-pertemuan').value;

      let list = databaseSiswaLokal[kelas] || databaseSiswaLokal["X DKV"];
      
      let tableRows = list.map((nama, i) => {
        const inputStatus = document.getElementById(`input-status-${i}`);
        const status = inputStatus ? inputStatus.value : "Hadir";
        return `<tr><td style="text-align:center;">${i+1}</td><td>${nama}</td><td style="text-align:center; font-weight:bold;">${status}</td></tr>`;
      }).join('');

      let content = `
        ${generateKopSurat('REKAPITULASI PRESENSI KEHADIRAN SISWA')}
        <table style="width: 100%; margin-bottom: 15px; font-size: 12px;">
          <tr><td style="width: 120px;">Mata Pelajaran</td><td>: ${mapel}</td><td style="width: 100px;">Pertemuan Ke</td><td>: ${pert}</td></tr>
          <tr><td>Kelas</td><td>: ${kelas}</td><td>Tanggal</td><td>: ${tgl}</td></tr>
        </table>
        <table style="width: 100%; border-collapse: collapse;" border="1" cellpadding="6">
          <thead><tr style="background-color: #f1f5f9;"><th style="width: 50px;">NO</th><th>NAMA LENGKAP SISWA</th><th style="width: 150px;">STATUS H/S/I/A</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
        ${generateKolomTandaTangan(guru)}
      `;
      bukaPreviewModal(content);
    }

    function tarikRekapNilaiPDF() {
      const kelas = document.getElementById('nil-kelas').value;
      const mapel = document.getElementById('nil-mapel').value;
      const guru = document.getElementById('nil-guru').value;
      const judul = document.getElementById('nil-judul').value || "Asesmen Sumatif / Tugas";

      let rows = [];
      document.querySelectorAll('.row-nilai').forEach((inp, i) => {
        rows.push(`<tr><td style="text-align:center;">${i+1}</td><td>${inp.getAttribute('data-nama')}</td><td style="text-align:center; font-weight:bold; color:#2563eb;">${inp.value}</td></tr>`);
      });

      if(rows.length === 0) return alert("Silakan muat dan isi lembar nilai siswa terlebih dahulu.");

      let content = `
        ${generateKopSurat('LEGER LAPORAN PENILAIAN SISWA')}
        <table style="width: 100%; margin-bottom: 15px; font-size: 12px;">
          <tr><td style="width: 120px;">Mata Pelajaran</td><td>: ${mapel}</td><td style="width: 120px;">Komponen Evaluasi</td><td>: ${judul}</td></tr>
          <tr><td>Kelas</td><td>: ${kelas}</td><td>Tahun Evaluasi</td><td>: 2026</td></tr>
        </table>
        <table style="width: 100%; border-collapse: collapse;" border="1" cellpadding="6">
          <thead><tr style="background-color: #f1f5f9;"><th style="width: 50px;">NO</th><th>NAMA LENGKAP SISWA</th><th style="width: 120px;">SKOR NILAI</th></tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>
        ${generateKolomTandaTangan(guru)}
      `;
      bukaPreviewModal(content);
    }

    function tarikRekapAgendaPDF() {
      const tgl = document.getElementById('age-tanggal').value;
      const kelas = document.getElementById('age-kelas').value;
      const mapel = document.getElementById('age-mapel').value;
      const materi = document.getElementById('age-materi').value;
      const status = document.getElementById('age-status').value;
      const tuntas = document.getElementById('age-ketuntasan').value;
      const hadir = document.getElementById('age-hadir').value;
      const alpa = document.getElementById('age-absen').value;
      const pert = document.getElementById('age-pertemuan').value;
      const guru = document.getElementById('age-guru').value;

      let content = `
        ${generateKopSurat('JURNAL AGENDA MENGAJAR HARIAN GURU')}
        <table style="width: 100%; border-collapse: collapse; font-size: 13px;" border="1" cellpadding="8">
          <tr><td style="width: 180px; background-color: #f1f5f9; font-weight: bold;">Hari, Tanggal Pelaksanaan</td><td>${tgl} (Pertemuan Ke-${pert})</td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Rombongan Belajar & Mapel</td><td>Kelas <strong>${kelas}</strong> - ${mapel}</td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Ringkasan Materi Pokok</td><td>${materi || 'Belum diisi'}</td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Kondisi & Ketuntasan KBM</td><td>Suasana: <strong>${status}</strong> / Keberhasilan: <strong>${tuntas}</strong></td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Statistik Absensi Kelas</td><td>Hadir: ${hadir} Siswa / Tidak Hadir: ${alpa} Siswa</td></tr>
        </table>
        ${generateKolomTandaTangan(guru)}
      `;
      bukaPreviewModal(content);
    }

    function tarikRekapBimbinganPDF() {
      const tgl = document.getElementById('bim-tanggal').value;
      const nama = document.getElementById('bim-nama-manual').value;
      const kat = document.getElementById('bim-kategori').value;
      const masalah = document.getElementById('bim-masalah').value;
      const solusi = document.getElementById('bim-solusi').value;
      const guru = document.getElementById('bim-guru').value;

      let content = `
        ${generateKopSurat('BERITA ACARA LAYANAN KONSULTASI / BK SISWA')}
        <table style="width: 100%; border-collapse: collapse; font-size: 13px;" border="1" cellpadding="8">
          <tr><td style="width: 180px; background-color: #f1f5f9; font-weight: bold;">Tanggal Kejadian Kasus</td><td>${tgl}</td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Nama Siswa Terkait</td><td><strong>${nama || 'Belum diisi'}</strong></td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Kategori Penanganan BK</td><td><span style="color: #e11d48; font-weight: bold;">${kat}</span></td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Uraian Masalah / Indikasi</td><td>${masalah || 'Belum diisi'}</td></tr>
          <tr><td style="background-color: #f1f5f9; font-weight: bold;">Solusi / Rencana Tindak Lanjut</td><td>${solusi || 'Belum diisi'}</td></tr>
        </table>
        ${generateKolomTandaTangan(guru)}
      `;
      bukaPreviewModal(content);
    }
  </script>
